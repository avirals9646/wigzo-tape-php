name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile || npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: yarn build || npm run build
        env:
          REACT_APP_BACKEND_URL: https://wigzotapes.com
          CI: false

      - name: Prepare backend deploy folder
        run: |
          mkdir -p deploy-api/config
          cp backend/public/index.php deploy-api/index.php
          cp backend/public/.htaccess deploy-api/.htaccess || true
          cp backend/config/config.php deploy-api/config/config.php

      - name: Deploy frontend to public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          local-dir: frontend/build/
          server-dir: public_html/
          exclude: |
            **/.git*
            **/.git*/**
            api/**
            api/**

      - name: Deploy backend API to public_html/api
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: deploy-api/
          server-dir: public_html/api/
